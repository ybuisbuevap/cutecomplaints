<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="./logo.jpg">
  <title>Cute Website</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>What's on your Heart, My Love?💖</h1>

    <div id="lastSeen" class="last-seen">Checking when he last saw your messages...</div>

    <form id="messageForm">
      <textarea id="message" placeholder="Type your message... (optional if you record audio)"></textarea>

      <div class="audio-controls">
        <button type="button" id="recordBtn">🎙️ Record</button>
        <button type="button" id="stopBtn" disabled>⏹️ Stop</button>
        <button type="button" id="discardBtn" style="display: none;">🗑️ Discard</button>
        <span id="recordingStatus"></span>
      </div>

      <audio id="audioPreview" controls style="display: none;"></audio>

      <div class="photo-controls">
        <label for="photoInput" class="photo-label">📷 Add Photo</label>
        <input type="file" id="photoInput" accept="image/*" capture="environment" style="display: none;">
        <button type="button" id="removePhotoBtn" style="display: none;">🗑️ Remove</button>
      </div>

      <img id="photoPreview" style="display: none;">

      <button type="submit">Send</button>
    </form>

    <div class="confirmation" id="confirmation"></div>
  </div>

  <!-- Firebase SDKs v8 -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

  <!-- Firebase config -->
  <script src="firebase-config.js"></script>

  <!-- Passphrase helper -->
  <script src="auth.js"></script>

  <!-- Submit script -->
  <script src="submit.js"></script>
</body>
</html>
