<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
   <link rel="icon" href="./logo.jpg">
  <title>Messages</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background-color: #fff0f6;
      padding: 20px;
      color: #333;
    }

    h1 {
      text-align: center;
      color: #d63384;
    }

    ul {
      list-style: none;
      padding: 0;
      max-width: 600px;
      margin: 0 auto;
    }

    li {
      background: #ffe0ec;
      margin: 10px 0;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
      position: relative;
    }

    .timestamp {
      font-size: 12px;
      color: #888;
      display: block;
      margin-top: 8px;
    }

    button.delete-btn {
      position: absolute;
      top: 10px;
      right: 15px;
      background-color: transparent;
      border: none;
      color: #ff4d6d;
      font-weight: bold;
      cursor: pointer;
    }

    #loginBox {
      max-width: 320px;
      margin: 60px auto;
      background: white;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 10px 20px rgba(255, 105, 180, 0.15);
      text-align: center;
    }

    #loginBox input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border: 2px solid pink;
      border-radius: 8px;
      box-sizing: border-box;
      font-size: 14px;
    }

    #loginBox button {
      background-color: #ff69b4;
      color: white;
      padding: 10px 20px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-size: 16px;
      width: 100%;
      margin-top: 8px;
    }

    #loginBox button:hover {
      background-color: #ff1493;
    }

    #loginError {
      color: #d63384;
      font-size: 13px;
      margin-top: 8px;
      min-height: 16px;
    }

    .message-text {
      margin-right: 30px;
    }

    li audio {
      width: 100%;
      margin-top: 8px;
      display: block;
    }

    #markSeenBtn {
      display: block;
      margin: 0 auto 20px;
      background-color: #ff69b4;
      color: white;
      padding: 10px 18px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-size: 14px;
    }

    #markSeenBtn:hover {
      background-color: #ff1493;
    }
  </style>
</head>
<body>
  <h1>Messages from My Love 💬</h1>

  <div id="loginBox">
    <p>This page is just for you 🔒</p>
    <input type="email" id="loginEmail" placeholder="Email" autocomplete="username">
    <input type="password" id="loginPassword" placeholder="Password" autocomplete="current-password">
    <button id="loginBtn">Log in</button>
    <div id="loginError"></div>
  </div>

  <button id="markSeenBtn" style="display: none;">Mark as seen 👀</button>
  <ul id="messageList" style="display: none;"></ul>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

  <!-- Your Firebase Config -->
  <script src="firebase-config.js"></script>

  <!-- JavaScript to read messages -->
  <script src="read.js"></script>
</body>
</html>
